<title>Collection Log Completionist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    color: #c8a96e;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #111;
    border-bottom: 2px solid #5c4a1e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.3rem; color: #c8a96e; letter-spacing: 1px; margin-right: auto; }
  #global-progress {
    font-size: 0.82rem;
    color: #a08848;
    text-align: right;
    line-height: 1.5;
  }
  #tier-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tier-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .tier-stat-label {
    font-size: 0.65rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tier-stat-pct {
    font-size: 0.9rem;
    font-weight: bold;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: #111;
    padding: 0 20px;
    border-bottom: 2px solid #5c4a1e;
  }
  .tab-btn {
    background: #222;
    border: 1px solid #5c4a1e;
    border-bottom: none;
    color: #a08848;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    margin-top: 6px;
    border-radius: 4px 4px 0 0;
  }
  .tab-btn:hover { background: #2e2e2e; }
  .tab-btn.active {
    background: #1a1a1a;
    color: #c8a96e;
    border-color: #c8a96e;
  }

  /* ── Tab content ── */
  .tab-panel { display: none; padding: 20px; }
  .tab-panel.active { display: block; }

  /* ── Tier progress bar ── */
  .tier-progress {
    margin-bottom: 16px;
  }
  .tier-progress-label {
    font-size: 0.85rem;
    color: #a08848;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    background: #2e2e2e;
    border: 1px solid #5c4a1e;
    border-radius: 4px;
    height: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: linear-gradient(90deg, #4a7c2f, #6abf3f);
    height: 100%;
    transition: width 0.4s ease;
  }

  /* ── Categorie kolommen ── */
  .categories-container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .category-section {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .category-header {
    display: block;
    background: #2a1e0e;
    border: 1px solid #5c4a1e;
    border-bottom: none;
    color: #c8a96e;
    font-size: 0.78rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px 3px 0 0;
    text-align: center;
    margin-bottom: 0;
  }

  /* ── Grid ── */
  .task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 54px);
    gap: 6px;
  }

  .task-cell {
    width: 54px;
    height: 54px;
    background: #252525;
    border: 2px solid #5c4a1e;
    border-radius: 3px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    overflow: visible;
  }
  .task-cell:hover { border-color: #c8a96e; transform: scale(1.08); z-index: 10; }
  .task-cell img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 4px;
    display: block;
  }

  /* Voltooid overlay */
  .task-cell.done::after {
    content: '✓';
    position: absolute;
    inset: 0;
    background: rgba(20, 80, 20, 0.72);
    color: #6abf3f;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px;
    pointer-events: none;
  }
  /* Collection log volledig voltooid */
  .task-cell.log-complete::after {
    background: rgba(5, 40, 5, 0.88);
    color: #2d7a2d;
  }

  /* Actief highlight */
  .task-cell.active-task {
    border-color: #ffd700 !important;
    box-shadow: 0 0 10px 3px rgba(255, 215, 0, 0.7) !important;
  }

  /* Randomizer highlight tijdens animatie */
  .task-cell.reel-highlight {
    border-color: #fff;
    box-shadow: 0 0 10px #ffffffaa;
  }

  /* ── Globale tooltip ── */
  #global-tooltip {
    display: none;
    position: fixed;
    background: #111;
    border: 1px solid #c8a96e;
    color: #c8a96e;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 0.75rem;
    z-index: 500;
    pointer-events: none;
    width: 200px;
    white-space: normal;
    line-height: 1.4;
  }
  #global-tooltip strong { display: block; margin-bottom: 4px; color: #ffd700; }

  /* ── Randomize / Complete knoppen ── */
  .randomize-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .randomize-btn {
    background: linear-gradient(180deg, #4a7c2f 0%, #2e5c1a 100%);
    border: 2px solid #6abf3f;
    color: #fff;
    padding: 12px 36px;
    font-size: 1rem;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
  }
  .randomize-btn:hover { opacity: 0.85; }
  .randomize-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .complete-btn {
    background: linear-gradient(180deg, #7c5a2f 0%, #5c3a1a 100%);
    border: 2px solid #c8a96e;
    color: #fff;
    padding: 12px 28px;
    font-size: 1rem;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    display: none;
  }
  .complete-btn.visible { display: inline-block; }
  .complete-btn:hover { opacity: 0.85; }

  /* ── Current task banner ── */
  #current-task-bar {
    display: flex;
    background: #161616;
    border-bottom: 2px solid #5c4a1e;
    padding: 10px 20px;
    align-items: center;
    gap: 14px;
    min-height: 62px;
  }
  #current-task-bar img {
    width: 40px;
    height: 40px;
    min-width: 40px;
    object-fit: contain;
    flex-shrink: 0;
  }
  #current-task-bar-label {
    font-size: 0.72rem;
    color: #a08848;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  #current-task-bar-name {
    font-size: 0.9rem;
    color: #ffd700;
    font-weight: bold;
  }
  #current-task-bar-req {
    font-size: 0.78rem;
    color: #888;
    margin-top: 2px;
  }
  #btn-clear-active {
    margin-left: auto;
    background: none;
    border: 1px solid #5c4a1e;
    color: #666;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    flex-shrink: 0;
  }
  #btn-clear-active:hover { border-color: #c8a96e; color: #c8a96e; }

  .bar-btn {
    height: 34px;
    padding: 0 14px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
    border: 1px solid;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .bar-btn:hover { opacity: 0.8; }
  .bar-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .bar-btn-green  { background: #2e5c1a; border-color: #6abf3f; color: #fff; }
  .bar-btn-gold   { background: #3a2a10; border-color: #c8a96e; color: #c8a96e; display: none; }
  .bar-btn-gold.visible { display: inline-flex; align-items: center; }
  .bar-btn-clear  { background: none; border-color: #5c4a1e; color: #666; }

  @keyframes cellPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); border-color: #ffd700; }
    40%  { box-shadow: 0 0 16px 6px rgba(255, 215, 0, 0.7); border-color: #fff; }
    100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); border-color: #ffd700; }
  }
  .task-cell.winner-pulse {
    animation: cellPulse 0.5s ease-out 3;
  }

  @keyframes bannerPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); background: #161616; }
    30%  { box-shadow: 0 0 18px 4px rgba(255, 215, 0, 0.5); background: #2a2200; }
    100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); background: #161616; }
  }
  #current-task-bar.pulse {
    animation: bannerPulse 0.8s ease-out forwards;
  }

  /* ── Modal ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal-box {
    background: #1e1e1e;
    border: 2px solid #c8a96e;
    border-radius: 6px;
    padding: 28px;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  #modal-box img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    margin-bottom: 12px;
  }
  #modal-name {
    font-size: 1.05rem;
    color: #ffd700;
    margin-bottom: 8px;
    font-weight: bold;
  }
  #modal-req {
    font-size: 0.82rem;
    color: #a08848;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  #modal-cl {
    font-size: 0.8rem;
    color: #7a9a6a;
    margin-bottom: 16px;
    line-height: 1.6;
    background: #1a2a1a;
    border: 1px solid #3a5a3a;
    border-radius: 4px;
    padding: 6px 10px;
    display: none;
  }
  #modal-cl .cl-title {
    color: #a8c888;
    font-weight: bold;
    margin-bottom: 3px;
    display: block;
  }
  .modal-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .modal-btns button {
    padding: 9px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
    border: 1px solid;
    transition: opacity 0.15s;
  }
  .modal-btns button:hover { opacity: 0.8; }
  #btn-set-active {
    background: #2a3a1a;
    border-color: #6abf3f;
    color: #6abf3f;
  }
  #btn-set-done {
    background: #3a2a10;
    border-color: #c8a96e;
    color: #c8a96e;
  }
  #btn-set-undone {
    background: #2a1a1a;
    border-color: #8b3030;
    color: #c05050;
  }
  #btn-close-modal {
    background: #222;
    border-color: #555;
    color: #888;
  }
</style>

// ── HELPERS ──────────────────────────────────────────────────────────────────
// Een taak kan in meerdere collection logs zitten via groups: [...]
function taskGroups(task) {
  if (task.groups) return task.groups;
  if (task.group)  return [task.group];
  return [];
}
function taskInGroup(task, group) {
  return taskGroups(task).includes(group);
}

// ── STATE ───────────────────────────────────────────────────────────────────
const TIERS = ["easy", "medium", "hard", "elite"];
const LS_KEY = "osrs_tasks_v1";

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  cloudPush();
}

let state = loadState();

function getTask(id) { return state[id] || { done: false, active: false }; }
function setDone(id, val) {
  state[id] = { ...getTask(id), done: val, active: val ? false : getTask(id).active };
  saveState(state);
}
function setActive(id, val) {
  if (val) {
    const tier = TASKS.find(t => t.id === id)?.tier;
    TASKS.filter(t => t.tier === tier).forEach(t => {
      if (t.id !== id) state[t.id] = { ...getTask(t.id), active: false };
    });
  }
  state[id] = { ...getTask(id), active: val };
  saveState(state);
}

// ── PROGRESS ─────────────────────────────────────────────────────────────────
function calcProgress(tier) {
  const tasks = TASKS.filter(t => t.tier === tier);
  const done = tasks.filter(t => getTask(t.id).done).length;
  return { done, total: tasks.length };
}
function calcGlobal() {
  const done = TASKS.filter(t => getTask(t.id).done).length;
  return { done, total: TASKS.length };
}
function pct(done, total) {
  return total === 0 ? 0 : Math.round((done / total) * 100);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderGlobal();
  renderActiveTab();
  renderCurrentTask();
}

function renderCurrentTask() {
  const activeTask = TASKS.find(t => getTask(t.id).active);

  // Injecteer CSS rule die de actieve cel target op data-id — overleeft renderAll()
  let styleTag = document.getElementById("active-cell-style");
  if (!styleTag) {
    styleTag = document.createElement("style");
    styleTag.id = "active-cell-style";
    document.head.appendChild(styleTag);
  }
  styleTag.textContent = activeTask
    ? `.task-cell[data-id="${activeTask.id}"] { border-color: #ffd700 !important; box-shadow: 0 0 10px 3px rgba(255,215,0,0.7) !important; }`
    : "";

  const bar = document.getElementById("current-task-bar");
  bar.classList.add("visible");
  const completeBtn = document.getElementById("btn-complete-task");
  const generateBtn = document.getElementById("btn-generate-task");
  const incomplete = TASKS.filter(t => t.tier === currentTab && !getTask(t.id).done);

  if (!activeTask) {
    document.getElementById("ct-img").src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
    document.getElementById("current-task-bar-name").textContent = "None";
    document.getElementById("current-task-bar-req").textContent = " ";
    completeBtn.classList.remove("visible");
  } else {
    document.getElementById("ct-img").src = activeTask.image;
    document.getElementById("current-task-bar-name").textContent = activeTask.name;
    document.getElementById("current-task-bar-req").textContent = "Requirements: " + activeTask.requirements;
    completeBtn.classList.add("visible");
  }

  generateBtn.disabled = !TIERS.includes(currentTab) || incomplete.length === 0;
}

function pctColor(p) {
  if (p >= 100) return "#4a8c2f";
  if (p >= 75)  return "#7abf3f";
  if (p >= 50)  return "#c8b800";
  if (p >= 25)  return "#c87800";
  return "#b83030";
}

function renderGlobal() {
  const { done, total } = calcGlobal();
  // Collection log slots (individuele entries)
  const groups = [...new Set(TASKS.flatMap(t => taskGroups(t)))];
  let slotsTotal = 0, slotsCompleted = 0, logsTotal = groups.length, logsCompleted = 0;
  groups.forEach(group => {
    const groupTasks = TASKS.filter(t => taskInGroup(t, group));
    const clTask = groupTasks.find(t => t.collectionLog);
    const clTotal = clTask ? clTask.collectionLog.total : (GROUP_TOTALS[group] ?? groupTasks.length);
    slotsTotal += clTotal;
    const doneTasks = groupTasks.filter(t => getTask(t.id).done);
    const doneSlots = doneTasks.reduce((sum, t) => sum + (t.slots || 1), 0);
    slotsCompleted += Math.min(doneSlots, clTotal);
    if (groupTasks.every(t => getTask(t.id).done)) logsCompleted++;
  });

  document.getElementById("stat-slots").textContent =
    `Total collection log slots completed: ${slotsCompleted} / ${slotsTotal}`;
  document.getElementById("stat-logs").textContent =
    `Total collection logs completed: ${logsCompleted} / ${logsTotal}`;

  const allTiers = ["easy", "medium", "hard", "elite", "passive", "pets"];
  const container = document.getElementById("tier-stats");
  container.innerHTML = "";
  allTiers.forEach(tier => {
    const { done: d, total: t } = calcProgress(tier);
    const p = pct(d, t);
    const el = document.createElement("div");
    el.className = "tier-stat";
    el.innerHTML = `
      <span class="tier-stat-label">${capitalize(tier)}</span>
      <span class="tier-stat-pct" style="color:${pctColor(p)}">${p}%</span>
    `;
    container.appendChild(el);
  });
}

let currentTab = "easy";

function renderActiveTab() {
  const main = document.getElementById("main");
  main.innerHTML = "";

  const tabs = ["easy","medium","hard","elite","passive","pets"];
  tabs.forEach(tier => {
    const panel = document.createElement("div");
    panel.className = "tab-panel" + (tier === currentTab ? " active" : "");
    panel.id = `panel-${tier}`;
    panel.appendChild(buildPanel(tier));
    main.appendChild(panel);
  });
}

const CATEGORIES = ["bosses", "raids", "clues", "minigames", "other", "achievements", "boss-pets", "raid-pets", "skilling-pets"];

function buildPanel(tier) {
  const frag = document.createDocumentFragment();
  const tasks = TASKS.filter(t => t.tier === tier);

  const { done, total } = calcProgress(tier);
  const bar = document.createElement("div");
  bar.className = "tier-progress";
  bar.innerHTML = `
    <div class="tier-progress-label">${capitalize(tier)}: ${done} / ${total} (${pct(done,total)}%)</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct(done,total)}%"></div></div>
  `;
  frag.appendChild(bar);

  // Render categorieën als kolommen naast elkaar
  const container = document.createElement("div");
  container.className = "categories-container";

  CATEGORIES.forEach(cat => {
    const catTasks = tasks.filter(t => (t.category || "other") === cat);
    if (catTasks.length === 0) return;

    const section = document.createElement("div");
    section.className = "category-section";

    const header = document.createElement("div");
    header.className = "category-header";
    header.textContent = capitalize(cat);
    section.appendChild(header);

    const grid = document.createElement("div");
    grid.className = "task-grid";
    grid.style.gridTemplateColumns = "repeat(3, 54px)";
    grid.style.border = "1px solid #5c4a1e";
    grid.style.padding = "6px";
    catTasks.forEach(task => grid.appendChild(buildCell(task)));
    section.appendChild(grid);

    container.appendChild(section);
  });

  frag.appendChild(container);

  return frag;
}

function buildCell(task) {
  const cell = document.createElement("div");
  cell.className = "task-cell";
  cell.dataset.id = task.id;
  if (getTask(task.id).done) {
    cell.classList.add("done");
    // Check of de hele collection log groep af is
    if (taskGroups(task).length > 0) {
      const allGroupsDone = taskGroups(task).every(group =>
        TASKS.filter(t => taskInGroup(t, group)).every(t => getTask(t.id).done)
      );
      if (allGroupsDone) cell.classList.add("log-complete");
    }
  }
  if (getTask(task.id).active) cell.classList.add("active-task");

  const img = document.createElement("img");
  img.src = task.image;
  img.alt = task.name;
  cell.appendChild(img);

  cell.addEventListener("mouseenter", () => {
    const gt = document.getElementById("global-tooltip");
    document.getElementById("gt-name").textContent = task.name;
    document.getElementById("gt-req").textContent = "Requirements: " + task.requirements;

    // Meet eerst (onzichtbaar)
    gt.style.visibility = "hidden";
    gt.style.display = "block";

    const rect = cell.getBoundingClientRect();
    const tw = gt.offsetWidth;
    const th = gt.offsetHeight;
    const pad = 8;
    const headerH = 90;

    let x = rect.left + rect.width / 2 - tw / 2;
    let y = rect.top - th - 8;

    if (y < headerH) y = rect.bottom + 8;
    if (x + tw > window.innerWidth - pad) x = window.innerWidth - pad - tw;
    if (x < pad) x = pad;

    gt.style.left = x + "px";
    gt.style.top  = y + "px";
    gt.style.visibility = "visible";
  });

  cell.addEventListener("mouseleave", () => {
    document.getElementById("global-tooltip").style.display = "none";
  });

  cell.addEventListener("click", () => {
    if (modalJustClosed) return;
    openModal(task);
  });

  return cell;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── TABS ─────────────────────────────────────────────────────────────────────
document.getElementById("tab-nav").addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  currentTab = btn.dataset.tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderActiveTab();
  renderGlobal();
});

// ── AUTO-PROGRESSIE ──────────────────────────────────────────────────────────
function checkAutoProgress() {
  for (let i = 0; i < TIERS.length - 1; i++) {
    const tier = TIERS[i];
    const { done, total } = calcProgress(tier);
    if (done === total && total > 0) {
      const nextTier = TIERS[i + 1];
      const { done: nextDone, total: nextTotal } = calcProgress(nextTier);
      if (nextDone < nextTotal) {
        currentTab = nextTier;
        document.querySelectorAll(".tab-btn").forEach(b => {
          b.classList.toggle("active", b.dataset.tab === nextTier);
        });
        renderAll();
        break;
      }
    }
  }
}

// ── RANDOMIZER (REEL) ────────────────────────────────────────────────────────
let reelRunning = false;

function updateBanner(task) {
  document.getElementById("current-task-bar").classList.add("visible");
  document.getElementById("ct-img").src = task.image;
  document.getElementById("current-task-bar-name").textContent = task.name;
  document.getElementById("current-task-bar-req").textContent = "Vereisten: " + task.requirements;
}

function startReel(tier) {
  if (reelRunning) return;
  reelRunning = true;

  const btn = document.getElementById("btn-generate-task");
  btn.disabled = true;

  const incomplete = TASKS.filter(t => t.tier === tier && !getTask(t.id).done);
  if (incomplete.length === 0) { reelRunning = false; return; }

  const winner = incomplete[Math.floor(Math.random() * incomplete.length)];
  const cells = [...document.querySelectorAll(".task-cell")].filter(c => {
    const id = c.dataset.id;
    return TASKS.find(t => t.id === id)?.tier === tier && !getTask(id).done;
  });
  if (cells.length === 0) { reelRunning = false; return; }

  const DURATION = 6000;
  const startTime = Date.now();
  let stopped = false;
  let lastCell = null;

  function stopReel() {
    if (stopped) return;
    stopped = true;

    cells.forEach(c => c.classList.remove("reel-highlight"));

    updateBanner(winner);
    const bar = document.getElementById("current-task-bar");
    bar.classList.remove("pulse");
    void bar.offsetWidth;
    bar.classList.add("pulse");

    setActive(winner.id, true);
    reelRunning = false;

    let styleTag = document.getElementById("active-cell-style");
    if (!styleTag) {
      styleTag = document.createElement("style");
      styleTag.id = "active-cell-style";
      document.head.appendChild(styleTag);
    }
    styleTag.textContent = `.task-cell[data-id="${winner.id}"] { border-color: #ffd700 !important; box-shadow: 0 0 10px 3px rgba(255,215,0,0.7) !important; }`;

    setTimeout(() => {
      renderAll();
    }, 50);
  }

  // Garanteer stop na precies 6 seconden
  setTimeout(stopReel, DURATION);

  function tick() {
    if (stopped) return;

    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / DURATION, 1);

    // Kies random cel (niet dezelfde als vorige)
    let randomCell;
    if (cells.length === 1) {
      randomCell = cells[0];
    } else {
      do {
        randomCell = cells[Math.floor(Math.random() * cells.length)];
      } while (randomCell === lastCell);
    }

    cells.forEach(c => c.classList.remove("reel-highlight"));
    randomCell.classList.add("reel-highlight");
    lastCell = randomCell;

    const currentTask = TASKS.find(t => t.id === randomCell.dataset.id);
    if (currentTask) updateBanner(currentTask);

    // Vertraging: begint op 60ms, loopt op naar 350ms naarmate tijd verstrijkt
    const delay = 60 + 290 * (progress * progress);
    setTimeout(tick, delay);
  }

  tick();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let modalTask = null;
let modalJustClosed = false;

function openModal(task) {
  modalTask = task;
  document.getElementById("modal-img").src = task.image;
  document.getElementById("modal-name").textContent = task.name;
  document.getElementById("modal-req").textContent = "Requirements: " + task.requirements;

  const clDiv = document.getElementById("modal-cl");
  const groups = taskGroups(task);
  if (groups.length > 0) {
    const bars = groups.map(group => {
      const groupTasks = TASKS.filter(t => taskInGroup(t, group));
      const cl = groupTasks.find(t => t.collectionLog)?.collectionLog;
      const groupDone  = groupTasks.filter(t => getTask(t.id).done).reduce((sum, t) => sum + (t.slots || 1), 0);
      const groupTotal = cl ? cl.total : (GROUP_TOTALS[group] ?? groupTasks.length);
      const groupPct   = groupTotal === 0 ? 0 : Math.round((groupDone / groupTotal) * 100);
      const label      = group.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `
        <div style="margin-bottom:8px;">
          <div style="font-size:0.75rem;color:#a08848;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;">${label}</div>
          <div style="margin-bottom:3px;font-size:0.85rem;color:#c8d8a8;font-weight:bold;">${groupDone} / ${groupTotal} (${groupPct}%)</div>
          <div style="background:#2e2e2e;border:1px solid #3a5a3a;border-radius:3px;height:8px;overflow:hidden;">
            <div style="background:linear-gradient(90deg,#4a7c2f,#6abf3f);width:${groupPct}%;height:100%;transition:width 0.3s;"></div>
          </div>
        </div>`;
    }).join('');
    clDiv.innerHTML = `<span class="cl-title">Collection log progress</span>${bars}`;
    clDiv.style.display = "block";
  } else {
    clDiv.style.display = "none";
  }

  const isDone = getTask(task.id).done;
  document.getElementById("btn-set-active").style.display = isDone ? "none" : "";
  document.getElementById("btn-set-done").style.display = isDone ? "none" : "";
  document.getElementById("btn-set-undone").style.display = isDone ? "" : "none";

  document.getElementById("btn-set-active").onclick = () => { setActive(task.id, true); closeModal(); };
  document.getElementById("btn-set-done").onclick   = () => { setDone(task.id, true);   closeModal(); checkAutoProgress(); };
  document.getElementById("btn-set-undone").onclick = () => { setDone(task.id, false);  closeModal(); };
  document.getElementById("btn-close-modal").onclick = closeModal;

  document.getElementById("modal-overlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
  modalTask = null;
  modalJustClosed = true;
  setTimeout(() => {
    modalJustClosed = false;
    renderAll();
  }, 50);
}

// Backdrop klik sluit modal
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});

// Wis actieve task
document.getElementById("btn-clear-active").addEventListener("click", () => {
  TASKS.forEach(t => { state[t.id] = { ...getTask(t.id), active: false }; });
  saveState(state);
  renderAll();
});

// Generate task knop
document.getElementById("btn-generate-task").addEventListener("click", () => {
  if (TIERS.includes(currentTab)) startReel(currentTab);
});

// Complete task knop
document.getElementById("btn-complete-task").addEventListener("click", () => {
  const cur = TASKS.find(t => getTask(t.id).active && !getTask(t.id).done);
  if (!cur) return;
  setDone(cur.id, true);
  renderAll();
  checkAutoProgress();
});


// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
document.getElementById("btn-export").addEventListener("click", () => {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "osrs-progress.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("btn-import").addEventListener("click", () => {
  document.getElementById("import-file-input").click();
});

document.getElementById("import-file-input").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      Object.assign(state, imported);
      saveState(state);
      renderAll();
      alert("Progressie geladen!");
    } catch {
      alert("Ongeldig bestand. Zorg dat je een geldig osrs-progress.json bestand importeert.");
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

// ── CLOUD SYNC (Firebase) ────────────────────────────────────────────────────
const SYNC_KEY = "osrs_sync_code";
let syncCode = localStorage.getItem(SYNC_KEY) || "";
let cloudRef = null;
let lastPushed = "";
let pushTimer = null;

function encodeKey(s) {
  return s.trim().toLowerCase().replace(/[.#$\[\]\/\s]/g, "_");
}

function updateSyncUI() {
  const el = document.getElementById("sync-status");
  if (!el) return;
  if (syncCode) {
    el.textContent = "🟢 Gekoppeld: " + syncCode;
    el.style.color = "#7ac87a";
  } else {
    el.textContent = "⚪ Niet gekoppeld";
    el.style.color = "#888";
  }
}

function cloudPush() {
  if (!cloudRef) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => {
    lastPushed = JSON.stringify(state);
    cloudRef.set(state).catch(e => console.warn("Sync opslaan mislukt:", e));
  }, 600);
}

function connectSync(code) {
  if (cloudRef) { cloudRef.off(); cloudRef = null; }
  syncCode = (code || "").trim();
  localStorage.setItem(SYNC_KEY, syncCode);
  updateSyncUI();
  if (!syncCode) return;

  cloudRef = firebase.database().ref("profiles/" + encodeKey(syncCode));
  cloudRef.once("value").then(snap => {
    const cloud = snap.val();
    if (cloud && Object.keys(cloud).length) {
      state = cloud;
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      renderAll();
    } else {
      lastPushed = JSON.stringify(state);
      cloudRef.set(state);
    }
    // Live meeluisteren naar andere apparaten
    cloudRef.on("value", s2 => {
      const remote = s2.val() || {};
      const remoteStr = JSON.stringify(remote);
      if (remoteStr === lastPushed) return;
      if (remoteStr === JSON.stringify(state)) return;
      state = remote;
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      renderAll();
    });
  }).catch(e => {
    console.warn("Sync koppelen mislukt:", e);
    alert("Kon niet koppelen aan de sync. Check je internetverbinding.");
  });
}

document.getElementById("btn-sync").addEventListener("click", () => {
  const code = prompt(
    "Vul je sync-code in (bijv. 'dennis-osrs').\n\n" +
    "Gebruik dezelfde code op elke pc/laptop om je progressie te delen.\n" +
    "Laat leeg en klik OK om te ontkoppelen.",
    syncCode
  );
  if (code === null) return; // geannuleerd
  connectSync(code);
});

updateSyncUI();
if (syncCode) connectSync(syncCode);

// ── BOOT ─────────────────────────────────────────────────────────────────────
renderAll();
</script>
